<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダイヤモンドチャレンジ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="label">VALORANT RANK CHALLENGE</p>
      <h1>ダイヤモンド<br><span>チャレンジ</span></h1>

      <section class="top-panel">
        <div class="rank-main">
          <p>現在ランク</p>
          <strong id="topRank">取得中...</strong>
          <span id="topRR">- RR</span>
        </div>

        <div class="top-mini">
          <div>
            <p>勝率</p>
            <strong id="topWinRate">-</strong>
          </div>
          <div>
            <p>KD</p>
            <strong id="topKD">-</strong>
          </div>
        </div>
      </section>

      <section class="challenge">
        <p class="challenge-label">チャレンジ達成まで</p>

        <div class="main-grid">
          <div>
            <p>残り日数</p>
            <strong id="challengeDays">-日</strong>
          </div>
          <div>
            <p>必要RR</p>
            <strong id="challengeRequiredRR">- RR</strong>
          </div>
        </div>

        <div class="pace-block">
          <h2>1日ペース</h2>
          <div class="grid">
            <div>
              <p>必要平均RR</p>
              <strong id="dailyRequiredRR">- RR/日</strong>
            </div>
            <div>
              <p>必要勝利数</p>
              <strong id="dailyRequiredWins">- 勝/日</strong>
            </div>
          </div>
        </div>

        <div class="pace-block">
          <h2>1週間ペース</h2>
          <div class="grid">
            <div>
              <p>必要平均RR</p>
              <strong id="weeklyRequiredRR">- RR/週</strong>
            </div>
            <div>
              <p>必要勝利数</p>
              <strong id="weeklyRequiredWins">- 勝/週</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="season">
        <h2>直近コンペ戦績</h2>

        <div class="grid">
          <div>
            <p>試合数</p>
            <strong id="seasonMatches">-</strong>
          </div>
          <div>
            <p>勝率</p>
            <strong id="seasonWinRate">-</strong>
          </div>
          <div>
            <p>勝利</p>
            <strong id="seasonWins">-</strong>
          </div>
          <div>
            <p>敗北</p>
            <strong id="seasonLosses">-</strong>
          </div>
          <div>
            <p>勝利時平均RR</p>
            <strong id="seasonAvgWinRR">-</strong>
          </div>
          <div>
            <p>敗北時平均RR</p>
            <strong id="seasonAvgLossRR">-</strong>
          </div>
        </div>
      </section>

      <p class="note" id="message">データを取得しています。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
