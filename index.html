<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VALORANT Act Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">VALORANT ACT TRACKER</p>
        <h1>Diamond Challenge</h1>
        <p class="subtitle">
          直近50試合を取得して、localStorageに保存。保存済みデータから今Actの戦績を集計します。
        </p>
      </div>

      <div class="player-card">
        <div class="player-name">松本絃歩</div>
        <div class="player-tag">#ギャル</div>
      </div>
    </section>

    <section class="status-card">
      <p id="statusText">待機中</p>
      <p id="periodText">集計期間：2026/6/24〜現在</p>
    </section>

    <section class="stats-grid">
      <div class="stat-card main">
        <div class="stat-label">今Act 試合数</div>
        <div class="stat-value" id="matchCount">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">勝利数</div>
        <div class="stat-value" id="winCount">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">敗北数</div>
        <div class="stat-value" id="lossCount">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">勝率</div>
        <div class="stat-value" id="winRate">0%</div>
      </div>
    </section>

    <section class="summary-card">
      <h2>Summary</h2>
      <p id="summaryText">読み込み中...</p>

      <div class="small-grid">
        <div>
          <span class="small-label">最新試合</span>
          <strong id="latestMatch">なし</strong>
        </div>

        <div>
          <span class="small-label">保存済み</span>
          <strong><span id="savedCount">0</span>試合</strong>
        </div>

        <div>
          <span class="small-label">今回追加</span>
          <strong><span id="addedCount">0</span>試合</strong>
        </div>
      </div>
    </section>

    <section class="action-card">
      <button id="reloadButton">再取得する</button>
      <button id="resetButton" class="danger">保存データをリセット</button>
    </section>

    <section class="error-card">
      <h2>Debug</h2>
      <pre id="debugText">まだログはありません。</pre>
    </section>

    <section class="log-card">
      <h2>Recent Matches</h2>
      <div id="matchList" class="match-list">
        <p class="muted">まだ試合データがありません。</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
